name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: PYTHONPATH=. pytest -q

      - name: Run simulated benchmark generator
        run: PYTHONPATH=. python scripts/generate_simulated_benchmarks.py

      - name: Run bundled example workflow
        run: PYTHONPATH=. python scripts/run_all_examples.py
